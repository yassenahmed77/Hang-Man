<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="master.css">
    <title>Hangman</title>
</head>
<body>
    <div class="container">
        <div class="info">
            <h3>Hangman</h3>
            <p>Word From: <span class="category"></span></p>
        </div>
        <hr>
        <div class="content">
            <div class="the-draw">
                <div class="draw">
                    <div class="stand"></div>
                    <div class="hang"></div>
                    <div class="rope"></div>
                    <div class="the-man">
                        <div class="head"></div>
                        <div class="body"></div>
                        <div class="hands"></div>
                        <div class="legs"></div>
                    </div>
                </div>
            </div>
            <div class="letters">
            </div>
        </div>
        <hr>
        <div class="chosen-letters">
        </div>
    </div>
    <!-- Js File -->
    <script src="main.js"></script>
</body>
</html>
